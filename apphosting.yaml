# Configuración para Firebase App Hosting
runConfig:
  # Evita el "cold start" manteniendo una instancia mínima si el presupuesto lo permite
  minInstances: 0
  maxInstances: 10
  # Next.js 16 puede ser intensivo en memoria con modelos 3D
  memory: 1Gi
  cpu: 1

env:
  - name: NODE_ENV
    value: production